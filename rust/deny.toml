[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2026-0097: "Rand is unsound with a custom logger using rand::rng()".
# This crate uses rand::rngs::OsRng directly (crypto.rs, pq_kem.rs) and does
# not call the affected rand::rng() thread-local API, so the advisory does not
# apply to production code. The transitive dependency comes via proptest.
# Remove this ignore once proptest (and/or rand) ship a patched release.
ignore = ["RUSTSEC-2026-0097"]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
