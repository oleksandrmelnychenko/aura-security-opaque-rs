name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 2.0.0)'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # Portable binaries for broad compatibility (client-facing artifacts, generic hosts).
  build-native-portable:
    name: Build Portable (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
            lib: libopaque_ffi.so
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: osx-arm64
            lib: libopaque_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win-x64
            lib: opaque_ffi.dll
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build FFI library (portable)
        working-directory: rust
        run: cargo build --release --package opaque-ffi --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.artifact }}
          find rust/target/${{ matrix.target }}/release -maxdepth 1 \
            \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) \
            -exec cp {} artifacts/${{ matrix.artifact }}/ \;
          ls -la artifacts/${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v4
        with:
          name: native-portable-${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}/
          retention-days: 7

  # Server-only binaries tuned for the runner CPU micro-architecture.
  # Do not use these artifacts for client distribution.
  build-native-server:
    name: Build Server Native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
            lib: libopaque_ffi.so
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: osx-arm64
            lib: libopaque_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win-x64
            lib: opaque_ffi.dll
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build FFI library (server native)
        working-directory: rust
        env:
          RUSTFLAGS: -C target-cpu=native
        run: cargo build --release --package opaque-ffi --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.artifact }}
          find rust/target/${{ matrix.target }}/release -maxdepth 1 \
            \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) \
            -exec cp {} artifacts/${{ matrix.artifact }}/ \;
          ls -la artifacts/${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v4
        with:
          name: native-server-${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}/
          retention-days: 7

  build-apple-xcframework:
    # Swift clients must consume portable artifacts.
    name: Build XCFramework (Portable Clients)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0.2'

      - name: Build Rust FFI for all Apple targets
        working-directory: rust
        run: |
          cargo build --release --package opaque-ffi --target aarch64-apple-darwin
          cargo build --release --package opaque-ffi --target aarch64-apple-ios
          cargo build --release --package opaque-ffi --target aarch64-apple-ios-sim
          cargo build --release --package opaque-ffi --target x86_64-apple-ios

      - name: Stage curated public headers
        run: |
          rm -rf rust/target/include
          mkdir -p rust/target/include
          cp rust/include/*.h rust/target/include/
          cp rust/include/module.modulemap rust/target/include/module.modulemap
          ls -la rust/target/include

      - name: Create fat simulator library
        run: |
          lipo -create \
            rust/target/aarch64-apple-ios-sim/release/libopaque_ffi.a \
            rust/target/x86_64-apple-ios/release/libopaque_ffi.a \
            -output rust/target/libopaque_ffi_sim.a

      - name: Create XCFramework
        run: |
          mkdir -p dist/apple
          xcodebuild -create-xcframework \
            -library rust/target/aarch64-apple-darwin/release/libopaque_ffi.a -headers rust/target/include \
            -library rust/target/aarch64-apple-ios/release/libopaque_ffi.a -headers rust/target/include \
            -library rust/target/libopaque_ffi_sim.a -headers rust/target/include \
            -output dist/apple/AuraOPAQUE.xcframework
          test -f dist/apple/AuraOPAQUE.xcframework/macos-arm64/Headers/opaque_api.h
          test -f dist/apple/AuraOPAQUE.xcframework/macos-arm64/Headers/opaque_relay.h
          test -f dist/apple/AuraOPAQUE.xcframework/macos-arm64/Headers/module.modulemap
          cd dist/apple && zip -r AuraOPAQUE.xcframework.zip AuraOPAQUE.xcframework
          swift package compute-checksum AuraOPAQUE.xcframework.zip > AuraOPAQUE.xcframework.zip.checksum

      - uses: actions/upload-artifact@v4
        with:
          name: apple-xcframework
          path: dist/apple/
          retention-days: 30

      - name: Attest Apple XCFramework
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/apple/AuraOPAQUE.xcframework.zip

  publish-release:
    name: GitHub Release
    needs: [build-native-portable, build-native-server, build-apple-xcframework]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Read checksum
        id: checksum
        run: echo "value=$(cat artifacts/apple-xcframework/AuraOPAQUE.xcframework.zip.checksum | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/apple-xcframework/AuraOPAQUE.xcframework.zip
            artifacts/apple-xcframework/AuraOPAQUE.xcframework.zip.checksum
          body: |
            ## Aura OPAQUE v${{ steps.version.outputs.VERSION }}

            ### Swift Package Manager
            ```swift
            .binaryTarget(
                name: "AuraOPAQUEBinary",
                url: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AuraOPAQUE.xcframework.zip",
                checksum: "${{ steps.checksum.outputs.value }}"
            )
            ```

            ### Platforms
            - Linux x64
            - macOS arm64
            - Windows x64
            - iOS (arm64, simulator)

            ### Native Artifact Profiles
            - `native-portable-*`: portable binaries for broad CPU compatibility.
            - `native-server-*`: server-only binaries built with `-C target-cpu=native`.
              Use only on controlled server hardware; do not ship to clients.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
